<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --danger: #f85149;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 4rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 500px; /* Centered Core Column */
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #f0f6fc;
        }

        .card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input, textarea {
            background: #090c10;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.6rem;
            color: var(--text-main);
            font-size: 0.95rem;
            width: 100%;
            margin-top: 0.25rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button.btn-submit {
            background-color: #21262d;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 0.6rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        button.btn-submit:hover {
            background-color: #30363d;
        }

        /* Notes List */
        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .note-item {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .note-title {
            font-size: 1rem;
            font-weight: 600;
            color: #f0f6fc;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px;
            border-radius: 4px;
        }

        .btn-delete:hover {
            color: var(--danger);
        }

        .note-body {
            font-size: 0.9rem;
            color: var(--text-main);
            line-height: 1.4;
            white-space: pre-wrap;
            margin-bottom: 1rem;
        }

        .note-footer {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
            font-size: 0.9rem;
            border: 1px dashed var(--border);
            border-radius: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Notes Server</h1>
        </header>

        <div class="card">
            <form id="noteForm">
                <div>
                    <label for="title">Title</label>
                    <input type="text" id="title" required autocomplete="off">
                </div>
                <div>
                    <label for="body">Content</label>
                    <textarea id="body" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Add Note</button>
            </form>
        </div>

        <div class="notes-list" id="notesGrid">
            <!-- Dynamic Notes list -->
            <div class="empty-state">No notes yet.</div>
        </div>
    </div>

    <script>
        const notesGrid = document.getElementById('notesGrid');
        const noteForm = document.getElementById('noteForm');

        async function loadNotes() {
            try {
                const res = await fetch('/api/v1/notes');
                const notes = await res.json();
                renderNotes(notes);
            } catch (err) {
                console.error('Error loading notes:', err);
            }
        }

        function renderNotes(notes) {
            if (!notes || notes.length === 0) {
                notesGrid.innerHTML = `<div class="empty-state">No notes yet.</div>`;
                return;
            }

            notesGrid.innerHTML = notes.map(note => {
                const date = new Date(note.createdAt).toLocaleDateString('en-US', {
                    month: 'short', day: 'numeric'
                });
                return `
                    <div class="note-item">
                        <div class="note-header">
                            <span class="note-title">${escapeHtml(note.title)}</span>
                            <button class="btn-delete" onclick="deleteNote('${note.id}')" title="Delete">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                        <p class="note-body">${escapeHtml(note.body)}</p>
                        <div class="note-footer">
                            <i class="far fa-clock"></i>
                            <span>${date}</span>
                        </div>
                    </div>
                `;
            }).reverse().join(''); // Reverse to show newest on top
        }

        noteForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const titleInput = document.getElementById('title');
            const bodyInput = document.getElementById('body');

            const payload = {
                title: titleInput.value,
                body: bodyInput.value
            };

            try {
                const res = await fetch('/api/v1/notes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    titleInput.value = '';
                    bodyInput.value = '';
                    loadNotes();
                }
            } catch (err) {
                console.error('Error creating note:', err);
            }
        });

        async function deleteNote(id) {
            if (!confirm('Are you sure?')) return;

            try {
                const res = await fetch(`/api/v1/notes/${id}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    loadNotes();
                }
            } catch (err) {
                console.error('Error deleting note:', err);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadNotes();
    </script>

</body>
</html>
